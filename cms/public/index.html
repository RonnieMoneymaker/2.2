<!doctype html>
<html class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CMS Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="h-full bg-gray-50 text-gray-900">
    <div class="min-h-screen flex">
      <!-- Sidebar -->
      <aside class="w-64 hidden md:flex flex-col bg-white border-r">
        <div class="h-16 flex items-center px-6 border-b">
          <div class="text-lg font-bold">Voltmover CMS</div>
        </div>
        <nav class="p-4 space-y-1">
          <a href="#dashboard" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-100 font-medium">Dashboard</a>
          <a href="#categories" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-100 font-medium">Categorieën</a>
          <a href="#products" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-100 font-medium">Producten</a>
        </nav>
        <div class="mt-auto p-4 text-xs text-gray-500">API: <code id="apiBase">/api</code></div>
      </aside>

      <!-- Main -->
      <main class="flex-1 flex flex-col">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-4 md:px-6">
          <div class="md:hidden text-lg font-bold">Voltmover CMS</div>
          <div class="flex items-center gap-2 text-sm">
            <input id="apiKeyInput" class="border rounded px-2 py-1 w-56" placeholder="API key" />
            <button id="saveKey" class="px-3 py-1 rounded bg-blue-600 text-white">Opslaan</button>
            <button id="themeToggle" class="px-3 py-1 rounded border">Thema</button>
          </div>
        </header>

        <!-- Content -->
        <div class="p-4 md:p-6 space-y-6" id="dashboard">
          <!-- KPIs -->
          <div id="kpis" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>

          <!-- Sales chart -->
          <div class="bg-white rounded-xl shadow p-4">
            <div class="flex items-center justify-between mb-2">
              <h2 class="font-semibold">Omzet (14 dagen)</h2>
            </div>
            <canvas id="salesChart" height="100"></canvas>
          </div>

          <!-- Two columns: categories and products -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <!-- Categories -->
            <section class="bg-white rounded-xl shadow p-4 space-y-3" id="categoriesPanel">
              <div class="flex items-center justify-between">
                <h2 class="font-semibold">Categorieën</h2>
              </div>
              <form id="catForm" class="flex gap-2 text-sm">
                <input class="border rounded px-2 py-1 flex-1" name="name" placeholder="Naam" required />
                <input class="border rounded px-2 py-1 flex-1" name="slug" placeholder="Slug" required />
                <button class="bg-blue-600 text-white rounded px-3">Toevoegen</button>
              </form>
              <ul id="categories" class="pl-1 text-sm text-gray-700 space-y-1"></ul>
            </section>

            <!-- Products -->
            <section class="bg-white rounded-xl shadow p-4 space-y-3" id="productsPanel">
              <div class="flex items-center justify-between">
                <h2 class="font-semibold">Producten</h2>
              </div>
              <form id="prodForm" class="grid grid-cols-2 md:grid-cols-6 gap-2 text-sm items-start">
                <input class="border rounded px-2 py-1" name="name" placeholder="Naam" required />
                <input class="border rounded px-2 py-1" name="slug" placeholder="Slug" required />
                <input class="border rounded px-2 py-1" name="sku" placeholder="SKU" />
                <input class="border rounded px-2 py-1" name="priceCents" placeholder="Prijs (centen)" type="number" min="0" />
                <select id="prodCategory" class="border rounded px-2 py-1"><option value="">(categorie)</option></select>
                <button class="bg-blue-600 text-white rounded px-3 md:col-span-1">Toevoegen</button>
              </form>
              <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                  <thead class="bg-gray-100">
                    <tr>
                      <th class="text-left p-2">Naam</th>
                      <th class="text-left p-2">SKU</th>
                      <th class="text-right p-2">Prijs</th>
                      <th class="p-2">Acties</th>
                    </tr>
                  </thead>
                  <tbody id="products"></tbody>
                </table>
              </div>
            </section>
          </div>

          <!-- Raw -->
          <section class="bg-white rounded-xl shadow p-4">
            <h2 class="font-semibold mb-2">Diagnostiek</h2>
            <pre id="out" class="text-xs bg-gray-50 p-3 rounded border"></pre>
          </section>
        </div>
      </main>
    </div>

    <!-- Toasts -->
    <div id="toast" class="fixed bottom-4 right-4 hidden px-4 py-2 rounded shadow text-white"></div>

    <script>
      // Theme toggle
      const htmlEl = document.documentElement;
      const themeToggle = document.getElementById('themeToggle');
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') htmlEl.classList.add('dark');
      themeToggle.addEventListener('click', () => {
        htmlEl.classList.toggle('dark');
        localStorage.setItem('theme', htmlEl.classList.contains('dark') ? 'dark' : 'light');
      });

      // API key
      const API_BASE = '';
      const apiBaseEl = document.getElementById('apiBase');
      if (apiBaseEl) apiBaseEl.textContent = API_BASE || '/api';
      const apiKeyInput = document.getElementById('apiKeyInput');
      const saveKeyBtn = document.getElementById('saveKey');
      apiKeyInput.value = localStorage.getItem('apiKey') || 'dev-api-key-123';
      saveKeyBtn.addEventListener('click', () => {
        localStorage.setItem('apiKey', apiKeyInput.value.trim());
        showToast('API key opgeslagen', 'bg-emerald-600');
        init();
      });

      function getApiKey() {
        return localStorage.getItem('apiKey') || 'dev-api-key-123';
      }

      async function json(url, opts = {}) {
        const headers = Object.assign({}, opts.headers || {}, { 'x-api-key': getApiKey() });
        const r = await fetch(url, Object.assign({}, opts, { headers }));
        if (!r.ok) throw new Error(r.status + ' ' + url);
        return r.json();
      }

      function showToast(msg, cls = 'bg-blue-600') {
        const t = document.getElementById('toast');
        t.className = 'fixed bottom-4 right-4 px-4 py-2 rounded shadow text-white ' + cls;
        t.textContent = msg;
        t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), 2000);
      }

      function renderKPIs(data) {
        const items = [
          { label: 'Producten', value: data.products, color: 'from-blue-500 to-blue-600' },
          { label: 'Categorieën', value: data.categories, color: 'from-indigo-500 to-indigo-600' },
          { label: 'Klanten', value: data.customers, color: 'from-emerald-500 to-emerald-600' },
          { label: 'Bestellingen', value: data.orders, color: 'from-amber-500 to-amber-600' },
        ];
        const kpis = document.getElementById('kpis');
        kpis.innerHTML = items.map(i => `
          <div class="rounded-xl shadow p-4 bg-gradient-to-br ${i.color} text-white">
            <div class="text-white/80 text-xs">${i.label}</div>
            <div class="text-2xl font-bold">${i.value}</div>
          </div>
        `).join('');
      }

      function renderChart(points) {
        try {
          if (!window.Chart) return;
          const ctx = document.getElementById('salesChart');
          const labels = points.map(p => p.date);
          const data = points.map(p => Math.round((p.totalCents||0)/100));
          new Chart(ctx, {
            type: 'line',
            data: {
              labels,
              datasets: [{ label: 'Omzet (€)', data, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.2)', tension: 0.25 }]
            },
            options: { responsive: true, plugins: { legend: { display: true } } }
          });
        } catch (_) {}
      }

      function renderCategories(list) {
        const ul = document.getElementById('categories');
        ul.innerHTML = list.length ? list.map(c => `
          <li class="flex items-center justify-between gap-2 border rounded px-2 py-1">
            <span>${c.name}</span>
            <button data-del-cat="${c.id}" class="text-red-600 hover:underline">verwijderen</button>
          </li>`).join('') : '<div class="text-sm text-gray-500">Geen categorieën</div>';
        const sel = document.getElementById('prodCategory');
        sel.innerHTML = '<option value="">(categorie)</option>' + list.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      }

      function renderProducts(list) {
        const tbody = document.getElementById('products');
        tbody.innerHTML = list.length ? list.map(p => `
          <tr class="border-b">
            <td class="p-2">${p.name}</td>
            <td class="p-2">${p.sku || '-'}</td>
            <td class="p-2 text-right">€ ${(((p.priceCents||0)/100)).toFixed(2)}</td>
            <td class="p-2 text-right"><button data-del-prod="${p.id}" class="text-red-600 hover:underline">verwijderen</button></td>
          </tr>
        `).join('') : '<tr><td colspan="4" class="p-4 text-sm text-gray-500">Geen producten</td></tr>';
      }

      async function init() {
        try {
          const stats = await json('/api/stats/overview');
          renderKPIs(stats);
          renderChart(stats.salesOverTime || []);
          const cats = await json('/api/categories');
          renderCategories(cats.categories || []);
          const prods = await json('/api/products');
          renderProducts(prods.products || []);
          const out = document.getElementById('out');
          if (out) out.textContent = JSON.stringify({ stats, cats, prods }, null, 2);
        } catch (e) {
          const out = document.getElementById('out');
          if (out) out.textContent = String(e);
        }
      }
      init();

      // Forms & actions
      document.addEventListener('submit', async (e) => {
        if (e.target && e.target.id === 'catForm') {
          e.preventDefault();
          const fd = new FormData(e.target);
          const body = { name: fd.get('name'), slug: fd.get('slug') };
          await json('/api/categories', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
          e.target.reset();
          const cats = await json('/api/categories');
          renderCategories(cats.categories || []);
          showToast('Categorie toegevoegd', 'bg-emerald-600');
          return;
        }
        if (e.target && e.target.id === 'prodForm') {
          e.preventDefault();
          const fd = new FormData(e.target);
          const body = {
            name: fd.get('name'), slug: fd.get('slug'), sku: fd.get('sku') || null,
            priceCents: parseInt(fd.get('priceCents') || '0', 10),
            categoryId: fd.get('prodCategory') ? parseInt(fd.get('prodCategory'), 10) : null
          };
          await json('/api/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
          e.target.reset();
          const prods = await json('/api/products');
          renderProducts(prods.products || []);
          showToast('Product toegevoegd', 'bg-emerald-600');
          return;
        }
      });

      document.addEventListener('click', async (e) => {
        const prodBtn = e.target.closest('[data-del-prod]');
        if (prodBtn) {
          const id = prodBtn.getAttribute('data-del-prod');
          await json(`/api/products/${id}`, { method: 'DELETE' });
          const prods = await json('/api/products');
          renderProducts(prods.products || []);
          showToast('Product verwijderd', 'bg-orange-600');
          return;
        }
        const catBtn = e.target.closest('[data-del-cat]');
        if (catBtn) {
          const id = catBtn.getAttribute('data-del-cat');
          await json(`/api/categories/${id}`, { method: 'DELETE' });
          const cats = await json('/api/categories');
          renderCategories(cats.categories || []);
          showToast('Categorie verwijderd', 'bg-orange-600');
          return;
        }
      });
    </script>
  </body>
  </html>
